<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viral Public Data</title>
  <style>
    :root {
      --bg: #efefef;
      --panel: #ffffff;
      --ink: #0d0d0d;
      --muted: #585858;
      --line: #d9d9d9;
      --accent: #d71920;
      --header: #050505;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, system-ui, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      background: var(--header);
      color: #ffffff;
      border-bottom: 5px solid var(--accent);
    }

    .topbar-inner,
    .shell {
      width: min(1220px, calc(100% - 24px));
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 0 12px;
    }

    .brand {
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--accent);
    }

    .tagline {
      max-width: 420px;
      font-size: 12px;
      line-height: 1.45;
      text-transform: uppercase;
      color: #d3d3d3;
      text-align: right;
      font-weight: 700;
    }

    .shell {
      padding: 14px 0 42px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-chip {
      padding: 7px 10px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .hero-main,
    .hero-side,
    .story-card,
    .message {
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .hero-main {
      padding: 18px 18px 20px;
    }

    .eyebrow,
    .label {
      display: inline-block;
      padding: 5px 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .hero-headline {
      margin: 12px 0 10px;
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: clamp(42px, 6vw, 84px);
      line-height: 0.94;
      text-transform: uppercase;
    }

    .hero-deck {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 700;
    }

    .hero-meta {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero-side {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .side-kicker {
      margin: 0;
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: 26px;
      line-height: 1;
      text-transform: uppercase;
    }

    .side-copy {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 700;
    }

    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 10px;
      padding: 8px 0;
      border-top: 3px solid var(--ink);
      border-bottom: 1px solid var(--line);
    }

    .section-bar h2 {
      margin: 0;
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: 26px;
      line-height: 1;
      text-transform: uppercase;
    }

    .section-bar p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .story-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      min-height: 220px;
    }

    .story-card .headline {
      margin: 0;
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: 30px;
      line-height: 0.98;
      text-transform: uppercase;
    }

    .story-card .subhead {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: #333333;
      font-weight: 700;
    }

    .story-card .meta {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .message {
      padding: 18px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 860px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tagline {
        display: none;
      }
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero-headline {
        font-size: 44px;
      }

      .story-card .headline {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Viral <span>Public</span> Data</div>
      <div class="tagline">Headline-driven coverage built from live public attention signals.</div>
    </div>
  </header>

  <main class="shell">
    <section class="status-row" id="status">
      <div class="status-chip">Loading bulletin</div>
    </section>

    <section id="hero"></section>

    <section class="section-bar">
      <h2>More Breaking Signals</h2>
      <p>Fast-moving topics people are searching right now</p>
    </section>

    <section id="content" class="grid" aria-live="polite"></section>
  </main>

  <script>
    const VERBS = ["SURGES", "SPIKES", "SOARS", "EXPLODES", "GAINS ATTENTION"];

    function formatTimestamp(value) {
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) {
        return value;
      }
      return parsed.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function titleCase(value) {
      return value
        .split(/\s+/)
        .filter(Boolean)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }

    function normalizeTopic(entry) {
      return (entry.title || entry.slug || "")
        .replace(/[-_]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function pickVerb(seed) {
      let total = 0;
      for (const char of seed) {
        total += char.charCodeAt(0);
      }
      return VERBS[total % VERBS.length];
    }

    function isLikelyPersonName(topic) {
      const parts = topic.split(" ").filter(Boolean);
      return parts.length >= 2 && parts.length <= 3 && parts.every((part) => /^[A-Za-z]+$/.test(part));
    }

    function buildHeadline(entry) {
      const topic = normalizeTopic(entry);
      const verb = pickVerb(entry.slug || entry.title || topic);
      const lowered = topic.toLowerCase();

      if (lowered.includes("recall")) {
        return `${topic.toUpperCase()} GAINS TRACTION ONLINE`;
      }
      if (lowered.includes("cause of death") || lowered.includes("death")) {
        return `${topic.toUpperCase()} SEARCHES SPIKE ONLINE`;
      }
      if (isLikelyPersonName(topic)) {
        return `${topic.toUpperCase()} BACK IN SPOTLIGHT AS SEARCHES SPIKE`;
      }
      if (topic.split(" ").length <= 3) {
        return `${topic.toUpperCase()} ${verb} IN ONLINE SEARCHES`;
      }
      return `${topic.toUpperCase()} ${verb} ONLINE`;
    }

    function buildSubheadline(entry) {
      const topic = titleCase(normalizeTopic(entry));
      const loweredTopic = topic.toLowerCase();
      const sourceKey = derivePrimarySource(entry);
      let source = "online attention";
      if (sourceKey === "google_trends") {
        source = "Google search activity";
      } else if (sourceKey === "wikipedia") {
        source = "Wikipedia traffic";
      } else if (sourceKey === "reddit") {
        source = "online chatter";
      }
      if (loweredTopic.includes("recall")) {
        return `Fresh search momentum is pushing the ${topic} story back into view.`;
      }
      if (isLikelyPersonName(topic)) {
        return `${topic} is drawing a fresh burst of attention as ${source.toLowerCase()} heats up.`;
      }
      return `${source} is driving fresh attention around ${topic}.`;
    }

    function derivePrimarySource(entry) {
      const summary = entry.summary || "";
      if (summary.includes("google_trends")) {
        return "google_trends";
      }
      if (summary.includes("wikipedia")) {
        return "wikipedia";
      }
      if (summary.includes("reddit")) {
        return "reddit";
      }
      return "unknown";
    }

    function sourceWeight(source) {
      if (source === "google_trends") {
        return 5;
      }
      if (source === "wikipedia") {
        return 3;
      }
      if (source === "reddit") {
        return 2;
      }
      return 1;
    }

    function urgencyWeight(topic) {
      const lowered = topic.toLowerCase();
      if (lowered.includes("recall")) {
        return 8;
      }
      if (lowered.includes("cause of death") || lowered.includes("death")) {
        return 7;
      }
      if (isLikelyPersonName(topic)) {
        return 6;
      }
      return 3;
    }

    function presentationScore(entry) {
      const topic = normalizeTopic(entry);
      const source = derivePrimarySource(entry);
      const slugScore = (entry.slug || "").length > 18 ? 0.5 : 0;
      return urgencyWeight(topic) + sourceWeight(source) + slugScore;
    }

    function sortEntriesForPresentation(entries) {
      return [...entries].sort((left, right) => {
        const scoreDelta = presentationScore(right) - presentationScore(left);
        if (scoreDelta !== 0) {
          return scoreDelta;
        }
        return String(right.timestamp || "").localeCompare(String(left.timestamp || ""));
      });
    }

    function setStatus(entries) {
      const status = document.getElementById("status");
      status.innerHTML = "";

      const total = document.createElement("div");
      total.className = "status-chip";
      total.textContent = `${entries.length} stories live`;
      status.appendChild(total);

      if (entries.length > 0) {
        const latest = document.createElement("div");
        latest.className = "status-chip";
        latest.textContent = `Updated ${formatTimestamp(entries[0].timestamp)}`;
        status.appendChild(latest);
      }

      const mode = document.createElement("div");
      mode.className = "status-chip";
      mode.textContent = "Headline feed";
      status.appendChild(mode);
    }

    function renderEmpty(message) {
      const hero = document.getElementById("hero");
      const content = document.getElementById("content");
      hero.innerHTML = `<div class="message">${message}</div>`;
      content.className = "";
      content.innerHTML = "";
    }

    function renderHero(entries) {
      const lead = entries[0];
      const secondary = entries[1];
      const hero = document.getElementById("hero");

      hero.innerHTML = `
        <div class="hero">
          <a class="hero-main" href="./article.html?slug=${encodeURIComponent(lead.slug)}">
            <div class="eyebrow">Top Trend</div>
            <h1 class="hero-headline">${buildHeadline(lead)}</h1>
            <p class="hero-deck">${buildSubheadline(lead)}</p>
            <div class="hero-meta">${formatTimestamp(lead.timestamp)} | ${lead.slug}</div>
          </a>
          <a class="hero-side" href="./article.html?slug=${encodeURIComponent((secondary || lead).slug)}">
            <div class="label">Watch List</div>
            <h2 class="side-kicker">${buildHeadline(secondary || lead)}</h2>
            <p class="side-copy">${buildSubheadline(secondary || lead)}</p>
          </a>
        </div>
      `;
    }

    async function loadArticles() {
      const response = await fetch("./index.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Index request failed with ${response.status}`);
      }

      const entries = await response.json();
      if (!Array.isArray(entries) || entries.length === 0) {
        setStatus([]);
        renderEmpty("No stories are live right now.");
        return;
      }

      const rankedEntries = sortEntriesForPresentation(entries);

      setStatus(rankedEntries);
      renderHero(rankedEntries);

      const content = document.getElementById("content");
      content.className = "grid";
      content.innerHTML = "";

      for (const entry of rankedEntries.slice(1)) {
        const card = document.createElement("a");
        card.className = "story-card";
        card.href = `./article.html?slug=${encodeURIComponent(entry.slug)}`;
        card.innerHTML = `
          <div class="label">Trending</div>
          <h2 class="headline">${buildHeadline(entry)}</h2>
          <p class="subhead">${buildSubheadline(entry)}</p>
          <div class="meta">
            <span>${formatTimestamp(entry.timestamp)}</span>
            <span>${entry.slug}</span>
          </div>
        `;
        content.appendChild(card);
      }
    }

    loadArticles().catch((error) => {
      console.error(error);
      renderEmpty("The site could not load the latest article index.");
    });
  </script>
</body>
</html>
